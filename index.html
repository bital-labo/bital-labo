<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>美体ラボ | 準備中</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600&family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Noto+Sans+JP:wght@300;400&display=swap" rel="stylesheet">

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1C1714;
    color: #F8F4EE;
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 30% 60%, rgba(196, 134, 106, 0.12) 0%, transparent 55%),
      radial-gradient(ellipse at 75% 30%, rgba(138, 158, 140, 0.08) 0%, transparent 45%);
    pointer-events: none;
  }

  .container {
    text-align: center;
    padding: 48px 32px;
    position: relative;
    z-index: 1;
  }

  .logo {
    font-family: 'Shippori Mincho', serif;
    font-size: 32px;
    font-weight: 600;
    letter-spacing: 0.2em;
    color: #F8F4EE;
    margin-bottom: 6px;
    opacity: 0;
    animation: fadeUp 0.8s ease 0.3s forwards;
  }

  .logo-en {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 14px;
    font-weight: 300;
    color: rgba(248, 244, 238, 0.4);
    letter-spacing: 0.35em;
    margin-bottom: 64px;
    display: block;
    opacity: 0;
    animation: fadeUp 0.8s ease 0.5s forwards;
  }

  .divider {
    width: 1px;
    height: 60px;
    background: linear-gradient(to bottom, transparent, rgba(196, 134, 106, 0.5), transparent);
    margin: 0 auto 64px;
    opacity: 0;
    animation: fadeIn 0.8s ease 0.7s forwards;
  }

  .message {
    font-family: 'Shippori Mincho', serif;
    font-size: clamp(20px, 4vw, 28px);
    font-weight: 400;
    line-height: 1.9;
    letter-spacing: 0.08em;
    color: #F8F4EE;
    margin-bottom: 32px;
    opacity: 0;
    animation: fadeUp 0.8s ease 0.9s forwards;
  }

  .sub {
    font-size: 13px;
    color: rgba(248, 244, 238, 0.4);
    letter-spacing: 0.15em;
    line-height: 2;
    opacity: 0;
    animation: fadeUp 0.8s ease 1.1s forwards;
  }

  .location {
    margin-top: 64px;
    padding-top: 40px;
    border-top: 1px solid rgba(248, 244, 238, 0.08);
    font-size: 12px;
    color: rgba(248, 244, 238, 0.25);
    letter-spacing: 0.2em;
    opacity: 0;
    animation: fadeIn 0.8s ease 1.4s forwards;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeIn {
    to { opacity: 1; }
  }
</style>
</head>
<body>
  <div class="container">
    <h1 class="logo">美体ラボ</h1>
    <span class="logo-en">Bital-Labo · Body Care Salon</span>
    <div class="divider"></div>
    <p class="message">
      サイトを準備中です。<br>
      もうしばらくお待ちください。
    </p>
    <p class="sub">広島市中区 ボディケアサロン</p>
    <p class="location">HIROSHIMA · NAKA-KU · COMING SOON</p>
  </div>
</body>
</html>
